<!-- 8D 分析弹窗（中/EN 切换 + 发生根因 + 流出原因 + 纠正措施） -->
<div id="rccaModal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/40" onclick="closeRcca()"></div>
  <div class="absolute left-1/2 top-1/2 w-[92vw] max-w-xl -translate-x-1/2 -translate-y-1/2 bg-white rounded-2xl shadow-2xl overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
      <div>
        <div class="font-bold text-gray-900">8D Analysis</div>
        <div id="rccaTrNo" class="text-xs text-gray-400 font-mono mt-0.5"></div>
      </div>
      <div class="flex items-center gap-2">
        <div class="flex items-center bg-gray-100 rounded-lg p-0.5" id="langToggle">
          <button type="button" onclick="setRccaLang('zh')" class="rcca-lang text-[10px] font-bold px-2.5 py-1 rounded-md bg-gray-900 text-white" data-lang="zh">中文</button>
          <button type="button" onclick="setRccaLang('en')" class="rcca-lang text-[10px] font-bold px-2.5 py-1 rounded-md text-gray-500 hover:text-gray-700" data-lang="en">EN</button>
        </div>
        <button onclick="closeRcca()" class="text-gray-400 hover:text-gray-700 text-xl leading-none ml-2">×</button>
      </div>
    </div>
    <div id="rccaBody" class="p-6">
      <div class="text-sm text-gray-400 text-center py-8">加载中...</div>
    </div>
    <div id="rccaFooter" class="hidden px-6 py-3 border-t border-gray-100 flex items-center justify-between">
      <div id="rccaStatus" class="text-xs font-bold"></div>
      <button type="button" id="rccaExtractBtn" class="hidden text-xs font-bold px-3 py-1.5 rounded-lg bg-violet-600 text-white hover:bg-violet-700">AI 重新提取</button>
    </div>
  </div>
</div>

<script>
let _rccaData = null;
let _rccaLang = 'zh';

function openRcca(trId) {
  _rccaData = null;
  document.getElementById('rccaModal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  document.getElementById('rccaBody').innerHTML = '<div class="text-sm text-gray-400 text-center py-8">加载中...</div>';
  document.getElementById('rccaFooter').classList.add('hidden');

  fetch(`/tr/8d-detail/${trId}`)
    .then(r => r.json())
    .then(data => {
      _rccaData = data;
      _rccaData._trId = trId;
      document.getElementById('rccaTrNo').textContent = data.tr_no + (data.part_number ? ` · ${data.part_number}` : '');
      renderRcca();
    })
    .catch(() => {
      document.getElementById('rccaBody').innerHTML = '<div class="text-sm text-red-500 text-center py-8">加载失败</div>';
    });
}

function closeRcca() {
  document.getElementById('rccaModal').classList.add('hidden');
  document.body.style.overflow = '';
}

function setRccaLang(lang) {
  _rccaLang = lang;
  document.querySelectorAll('.rcca-lang').forEach(btn => {
    const active = btn.dataset.lang === lang;
    btn.className = 'rcca-lang text-[10px] font-bold px-2.5 py-1 rounded-md '
      + (active ? 'bg-gray-900 text-white' : 'text-gray-500 hover:text-gray-700');
  });
  if (_rccaData) renderRcca();
}

function renderRcca() {
  const d = _rccaData;
  const zh = _rccaLang === 'zh';

  // Status display
  const statusMap = {
    'NOT_REQUIRED': ['不要求', 'Not Required', '#94a3b8', 'bg-gray-100'],
    'NOT_RECEIVED': ['未收到', 'Not Received', '#f59e0b', 'bg-amber-50'],
    'RECEIVED_REJECT': ['已收到 (拒收)', 'Received (Reject)', '#ef4444', 'bg-red-50'],
    'RECEIVED_PASS': ['已收到 (通过)', 'Received (Pass)', '#22c55e', 'bg-green-50'],
  };
  const st = statusMap[d.status] || statusMap['NOT_REQUIRED'];

  const rootCause = zh
    ? d.root_cause
    : (d.root_cause_en || d.root_cause);

  const escapeCause = zh
    ? d.escape_cause
    : (d.escape_cause_en || d.escape_cause);

  const rootAction = zh
    ? d.action
    : (d.action_en || d.action);

  const escapeAction = zh
    ? d.escape_action
    : (d.escape_action_en || d.escape_action);

  const hasAny =
    rootCause ||
    escapeCause ||
    rootAction ||
    escapeAction;

  let html = '';

  if (!hasAny) {

    html = `
      <div class="text-center py-8">
        <div class="text-gray-300 mb-3">
          <svg class="w-12 h-12 mx-auto"
               fill="none"
               stroke="currentColor"
               viewBox="0 0 24 24"
               stroke-width="1.5">
            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>

        <p class="text-sm text-gray-500 font-semibold">
          ${zh ? '暂无 8D 分析数据' : 'No 8D analysis data yet'}
        </p>

        <p class="text-xs text-gray-400 mt-1">
          ${zh
            ? '上传 8D 报告后点击「AI 重新提取」'
            : 'Upload an 8D report, then click "AI Re-extract"'}
        </p>
      </div>
    `;

  } else {

    // ─────────────────────────────
    // 组 1：发生根因 + 纠正措施
    // ─────────────────────────────
    html += `
      <div class="mb-5 rounded-xl border border-gray-200 overflow-hidden">

        <div class="px-4 py-2.5 bg-gray-50 flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-red-500 shrink-0"></span>
          <span class="text-xs font-bold text-gray-900 uppercase tracking-wide">
            ${zh ? '发生根本原因' : 'Occurrence Root Cause'}
          </span>
        </div>

        <div class="px-4 py-3 text-sm text-gray-700 leading-relaxed">
          ${
            rootCause ||
            `<span class="text-gray-400 italic">${
              zh ? '未提取到' : 'Not extracted'
            }</span>`
          }
        </div>

        <div class="px-4 py-2.5 bg-blue-50/50 border-t border-gray-100 flex items-start gap-2">
          <span class="text-blue-500 text-xs mt-0.5">▸</span>

          <div>
            <div class="text-[10px] font-bold text-blue-700 uppercase mb-1">
              ${zh ? '纠正措施（发生）' : 'Corrective Action (Occurrence)'}
            </div>

            <div class="text-sm text-gray-700 leading-relaxed">
              ${
                rootAction ||
                `<span class="text-gray-400 italic">${
                  zh ? '未提取到' : 'Not extracted'
                }</span>`
              }
            </div>
          </div>
        </div>

      </div>
    `;

    // ─────────────────────────────
    // 组 2：流出原因 + 纠正措施
    // ─────────────────────────────
    const noEscape = !escapeCause;

    html += `
      <div class="rounded-xl border ${
        noEscape ? 'border-amber-200' : 'border-gray-200'
      } overflow-hidden">

        <div class="px-4 py-2.5 ${
          noEscape ? 'bg-amber-50' : 'bg-gray-50'
        } flex items-center gap-2">

          <span class="w-2.5 h-2.5 rounded-full bg-amber-500 shrink-0"></span>

          <span class="text-xs font-bold text-gray-900 uppercase tracking-wide">
            ${zh ? '流出原因（检测失效）' : 'Escape / Detection Root Cause'}
          </span>

          ${
            noEscape
              ? `
              <span class="text-[9px] font-bold text-amber-600 bg-amber-100 border border-amber-200 px-1.5 py-0.5 rounded">
                ⚠ ${zh ? '报告未提供' : 'Not in report'}
              </span>
            `
              : ''
          }
        </div>

        <div class="px-4 py-3 text-sm leading-relaxed ${
          noEscape
            ? 'text-amber-700 italic'
            : 'text-gray-700'
        }">

          ${
            escapeCause ||
            (
              zh
                ? '该 8D 报告中未说明流出/检测失效原因，建议要求供应商补充。'
                : 'Not addressed in this 8D report. Consider requesting the supplier to supplement.'
            )
          }

        </div>

        <div class="px-4 py-2.5 bg-blue-50/50 border-t ${
          noEscape ? 'border-amber-100' : 'border-gray-100'
        } flex items-start gap-2">

          <span class="text-blue-500 text-xs mt-0.5">▸</span>

          <div>
            <div class="text-[10px] font-bold text-blue-700 uppercase mb-1">
              ${zh ? '纠正措施（流出）' : 'Corrective Action (Detection)'}
            </div>

            <div class="text-sm leading-relaxed ${
              !escapeAction
                ? 'text-gray-400 italic'
                : 'text-gray-700'
            }">

              ${
                escapeAction ||
                (zh ? '未提供' : 'Not provided')
              }

            </div>
          </div>
        </div>

      </div>
    `;
  }

  document.getElementById('rccaBody').innerHTML = html;

  // Footer
  const footer = document.getElementById('rccaFooter');
  footer.classList.remove('hidden');

  const statusEl = document.getElementById('rccaStatus');
  statusEl.innerHTML = `
    <span class="inline-flex items-center gap-1.5">
      <span class="w-2 h-2 rounded-full" style="background:${st[2]}"></span>
      ${zh ? st[0] : st[1]}
    </span>
  `;

  const extractBtn = document.getElementById('rccaExtractBtn');

  if (d.has_8d_doc) {
    extractBtn.classList.remove('hidden');
    extractBtn.textContent = zh ? 'AI 重新提取' : 'AI Re-extract';

    extractBtn.onclick = () => {
      extractBtn.disabled = true;
      extractBtn.textContent = zh ? '提取中...' : 'Extracting...';

      fetch(`/tr/8d-extract/${d._trId}`, {
        method: 'POST'
      })
      .then(r => r.json())
      .then(res => {
        extractBtn.textContent = res.ok
          ? (zh
              ? '✓ 已触发，约30秒后刷新'
              : '✓ Triggered, refresh in ~30s')
          : (res.msg || 'Failed');

        setTimeout(() => {
          extractBtn.disabled = false;
          extractBtn.textContent = zh
            ? 'AI 重新提取'
            : 'AI Re-extract';
        }, 5000);
      });
    };

  } else {
    extractBtn.classList.add('hidden');
  }
}
</script>
